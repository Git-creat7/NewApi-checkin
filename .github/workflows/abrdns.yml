name: abrdns-checkin

on:
  workflow_dispatch:
  schedule:
    # 北京时间 9:00-12:00 对应 UTC 1:00-4:00
    # 在每个小时的 0 分触发，再由脚本随机延迟
    - cron: '0 1 * * *'
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Random delay (0-180 min)
        run: |
          DELAY=$(python3 -c "import random; print(random.randint(0, 180))")
          echo "随机延迟 $DELAY 分钟"
          sleep $DELAY

      - name: Run Script
        env:
          ABRDNS_SESSION: ${{ secrets.ABRDNS_SESSION }}
          ABRDNS_API_USER: ${{ secrets.ABRDNS_API_USER }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          ABRDNS_BASE_URL: "https://new-api.abrdns.com"
        run: python checkin/abrdns/checkin.py